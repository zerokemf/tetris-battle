<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris - SRS Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="side-panel">
            <div class="neon-window">
                <div class="panel-header">HOLD</div>
                <div class="panel-content">
                    <canvas id="hold1" width="80" height="80"></canvas>
                </div>
            </div>
            <div class="neon-window">
                <div class="panel-header">操作說明</div>
                <div class="panel-content controls-text">
                    ← → : 移動<br>
                    ↑ : 順轉 (SRS)<br>
                    Z : 逆轉 (SRS)<br>
                    ↓ : 軟降<br>
                    Space : 硬降<br>
                    C : 保留<br>
                    P : 暫停
                </div>
            </div>
        </div>

        <div class="center-arena">
            <h1 class="vs-text">TETRIS</h1>
            <div class="canvas-wrapper">
                <canvas id="board1" width="300" height="600"></canvas>
                <canvas id="fx1" class="fx-layer" width="300" height="600"></canvas>
                <div id="status-overlay" class="hidden"></div>
            </div>
            <button class="pause-btn" onclick="togglePause()">⏸️ PAUSE</button>
        </div>

        <div class="side-panel">
            <div class="neon-window">
                <div class="panel-header">NEXT</div>
                <div class="panel-content">
                    <canvas id="next1" width="80" height="120"></canvas>
                </div>
            </div>
            <div class="neon-window">
                <div class="panel-header">ARENA STATS</div>
                <div class="panel-content stats-text">
                    <div>⭐ K.O.</div>
                    <div id="stars1">★★★★★</div>
                    <br>
                    <div>Lines: <span id="sent1">0</span></div>
                    <div>Score: <span id="score1">0</span></div>
                    <div>Level: <span id="level1">1</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="menu-screen" id="menu">
        <h1 class="title">🧊 TETRIS</h1>
        <button class="neon-btn" onclick="startGame()">
            <span class="icon">🎮</span> 開始遊戲
        </button>
    </div>

    <div class="gameover-screen" id="gameover">
        <h1>GAME OVER</h1>
        <p id="winner-text"></p>
        <button class="neon-btn" onclick="backMenu()">返回選單</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
