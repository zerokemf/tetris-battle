<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Battle - Rescue Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- 左側面板 -->
        <div class="side-panel">
            <div class="neon-window">
                <div class="panel-header">HOLD</div>
                <div class="panel-content" id="hold-box">
                    <canvas id="hold1" ></canvas>
                </div>
            </div>
            <div class="neon-window">
                <div class="panel-header">操作說明</div>
                <div class="panel-content controls-text">
                    ← → : 移動<br>
                    ↑ : 旋轉<br>
                    Z : 逆旋<br>
                    ↓ : 軟降<br>
                    Space : 硬降<br>
                    C : 保留
                </div>
            </div>
        </div>

        <!-- 中央競技場 -->
        <div class="center-arena">
            <h1 class="vs-text">TETRIS</h1>
            <div class="canvas-wrapper">
                <canvas id="board1" ></canvas>
                <canvas id="fx1" class="fx-layer" ></canvas>
                <div id="status-overlay" class="hidden"></div>
            </div>
            <button class="pause-btn" onclick="togglePause()">⏸️ PAUSE</button>
        </div>

        <!-- 右側面板 -->
        <div class="side-panel">
            <div class="neon-window">
                <div class="panel-header">NEXT</div>
                <div class="panel-content flex-column" id="next-queue">
                    <canvas id="next1" ></canvas>
                </div>
            </div>
            <div class="neon-window">
                <div class="panel-header">ARENA STATS</div>
                <div class="panel-content stats-text">
                    <div>⭐ K.O.</div>
                    <div id="stars1">★★★★★</div>
                    <br>
                    <div>Lines: <span id="sent1">0</span></div>
                    <div>Score: <span id="score1">0</span></div>
                    <div>Level: <span id="level1">1</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 選單 -->
    <div class="menu-screen" id="menu">
        <h1 class="title">🧊 TETRIS BATTLE</h1>
        <button class="neon-btn" onclick="startGame()">
            <span class="icon">🎮</span> 開始遊戲
        </button>
    </div>

    <!-- 結束畫面 -->
    <div class="gameover-screen" id="gameover">
        <h1>GAME OVER</h1>
        <p id="winner-text"></p>
        <button class="neon-btn" onclick="backMenu()">返回選單</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
