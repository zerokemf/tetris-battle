<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 選單 -->
    <div class="menu-screen" id="menu">
        <h1 class="title">🧊 TETRIS BATTLE</h1>
        <button class="btn" onclick="startGame()">開始遊戲</button>
        <div class="controls-info">
            <h3>操作說明</h3>
            <p>移動 ← → | 旋轉 ↑ / Z | 軟降 ↓<br>硬降 空白 | Hold C</p>
        </div>
    </div>

    <!-- 遊戲區 -->
    <div class="game-container" id="game">
        <!-- 玩家1 -->
        <div class="player-panel" id="p1-panel">
            <div class="stats-bar">
                <span class="ko-stars" id="stars1">⭐️⭐️⭐️⭐️⭐️</span>
                <span class="lines-sent" id="sent1">Lines: 0</span>
            </div>
            <div class="canvas-wrapper">
                <canvas id="board1" width="300" height="600"></canvas>
                <canvas id="fx1" class="fx-layer" width="300" height="600"></canvas>
            </div>
            <div class="hold-next-panel">
                <div class="hold-box">
                    <span class="box-label">HOLD</span>
                    <canvas id="hold1" width="80" height="80"></canvas>
                </div>
                <div class="next-box">
                    <span class="box-label">NEXT</span>
                    <canvas id="next1" width="80" height="80"></canvas>
                </div>
            </div>
            <div class="score-panel">
                <div class="score-row"><span>SCORE</span><span id="score1">0</span></div>
                <div class="score-row"><span>LEVEL</span><span id="level1">1</span></div>
            </div>
        </div>

        <!-- 中間區域 -->
        <div class="center-arena">
            <h1 class="vs-text" id="vs-text" style="display:none">VS</h1>
            <div class="combo-display" id="combo"></div>
        </div>

        <!-- 玩家2 -->
        <div class="player-panel" id="p2-panel" style="display:none">
            <div class="stats-bar">
                <span class="ko-stars" id="stars2">⭐️⭐️⭐️⭐️⭐️</span>
                <span class="lines-sent" id="sent2">Lines: 0</span>
            </div>
            <div class="canvas-wrapper">
                <canvas id="board2" width="300" height="600"></canvas>
                <canvas id="fx2" class="fx-layer" width="300" height="600"></canvas>
            </div>
            <div class="hold-next-panel">
                <div class="hold-box">
                    <span class="box-label">HOLD</span>
                    <canvas id="hold2" width="80" height="80"></canvas>
                </div>
                <div class="next-box">
                    <span class="box-label">NEXT</span>
                    <canvas id="next2" width="80" height="80"></canvas>
                </div>
            </div>
            <div class="score-panel">
                <div class="score-row"><span>SCORE</span><span id="score2">0</span></div>
                <div class="score-row"><span>LEVEL</span><span id="level2">1</span></div>
            </div>
        </div>
    </div>

    <!-- 結束畫面 -->
    <div class="gameover-screen" id="gameover">
        <h1>GAME OVER</h1>
        <p id="winner-text"></p>
        <button class="btn" onclick="backMenu()">返回選單</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
