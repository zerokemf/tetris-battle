<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Battle - VFX Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 选单画面 -->
    <div class="menu-screen" id="menu">
        <h1 class="title">🧊 TETRIS BATTLE</h1>
        <button class="neon-btn" onclick="startGame()">
            <span class="icon">🎮</span> 開始遊戲
        </button>
        
        <div class="controls-guidePanel">
            <h3>操作說明 (P1)</h3>
            <ul>
                <li><span class="key">←</span> <span class="key">→</span> : 移動</li>
                <li><span class="key">↑</span> : 順時針旋轉</li>
                <li><span class="key">Z</span> : 逆時針旋轉</li>
                <li><span class="key">↓</span> : 軟降 (Soft)</li>
                <li><span class="key">Space</span> : 硬降 (Hard)</li>
                <li><span class="key">C</span> : 保留 (Hold)</li>
            </ul>
        </div>
    </div>

    <!-- 遊戲區 -->
    <div class="game-container" id="game">
        <!-- 操作說明卡 -->
        <div class="controls-guidePanel">
            <h3>操作說明 (P1)</h3>
            <ul>
                <li><span class="key">←</span> <span class="key">→</span> : 移動</li>
                <li><span class="key">↑</span> : 順時針旋轉</li>
                <li><span class="key">Z</span> : 逆時針旋轉</li>
                <li><span class="key">↓</span> : 軟降</li>
                <li><span class="key">Space</span> : 硬降</li>
                <li><span class="key">C</span> : Hold</li>
                <li><span class="key">P</span> : 暂停</li>
            </ul>
        </div>

        <!-- 玩家1 -->
        <div class="player-panel" id="player1">
            <div class="stats-bar">
                <span class="ko-stars" id="stars1">⭐⭐⭐⭐⭐</span>
                <span class="lines-sent" id="sent1">Lines: 0</span>
            </div>
            <div class="canvas-wrapper">
                <canvas id="board1" width="300" height="600"></canvas>
                <canvas id="fx1" class="fx-layer" width="300" height="600"></canvas>
            </div>
            <div class="hold-next-panel">
                <div class="hold-box">
                    <span class="box-label">HOLD</span>
                    <canvas id="hold1" width="80" height="80"></canvas>
                </div>
                <div class="next-box">
                    <span class="box-label">NEXT</span>
                    <canvas id="next1" width="80" height="80"></canvas>
                </div>
            </div>
            <div class="score-panel">
                <div class="score-row"><span>SCORE</span><span id="score1">0</span></div>
                <div class="score-row"><span>LEVEL</span><span id="level1">1</span></div>
            </div>
        </div>

        <!-- 中间区域 -->
        <div class="center-arena">
            <button id="pauseBtn" class="pause-btn" onclick="togglePause()">
                <span class="icon">⏸️</span> PAUSE
            </button>
            <div class="combo-display" id="combo"></div>
            <div class="paused-overlay" id="pausedOverlay">
                <h2>PAUSED</h2>
                <p>按 P 继续</p>
            </div>
        </div>
    </div>

    <!-- 結束畫面 -->
    <div class="gameover-screen" id="gameover">
        <h1>GAME OVER</h1>
        <p id="winner-text"></p>
        <button class="neon-btn" onclick="backMenu()">返回选单</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
