<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 選單 -->
    <div class="menu-screen" id="menu">
        <h1 class="title">🧊 TETRIS BATTLE</h1>
        <button class="neon-btn" onclick="startGame()">
            <span class="icon">🎮</span> 開始遊戲
        </button>
    </div>

    <!-- 遊戲區 -->
    <div class="game-container" id="game">
        <!-- 左側 -->
        <div class="left-panel">
            <div class="panel">
                <div class="panel-title">HOLD</div>
                <canvas id="hold1" width="100" height="80"></canvas>
            </div>
            <div class="panel">
                <div class="panel-title">操作說明</div>
                <div class="controls">
                    <div><span class="key">← →</span> 移動</div>
                    <div><span class="key">↑</span> 旋轉</div>
                    <div><span class="key">Z</span> 逆旋</div>
                    <div><span class="key">↓</span> 軟降</div>
                    <div><span class="key">Space</span> 硬降</div>
                    <div><span class="key">C</span> Hold</div>
                </div>
            </div>
        </div>

        <!-- 中央 -->
        <div class="center-panel">
            <div class="game-title">TETRIS</div>
            <div class="canvas-wrap">
                <canvas id="board1" width="300" height="600"></canvas>
                <canvas id="fx1" class="fx-layer" width="300" height="600"></canvas>
                <div class="paused-overlay" id="pausedOverlay">
                    <h2>PAUSED</h2>
                    <p>按 P 繼續</p>
                </div>
            </div>
            <button class="pause-btn" onclick="togglePause()">⏸️ PAUSE</button>
        </div>

        <!-- 右側 -->
        <div class="right-panel">
            <div class="panel">
                <div class="panel-title">NEXT</div>
                <canvas id="next1" width="100" height="180"></canvas>
            </div>
            <div class="panel">
                <div class="panel-title">ARENA STATS</div>
                <div class="stats">
                    <div class="stat-row"><span>⭐ K.O.</span><span id="stars1">★★★★★</span></div>
                    <div class="stat-row"><span>Lines</span><span id="sent1">0</span></div>
                    <div class="stat-row"><span>Score</span><span id="score1">0</span></div>
                    <div class="stat-row"><span>Level</span><span id="level1">1</span></div>
                </div>
            </div>
            <div class="combo-display" id="combo"></div>
        </div>
    </div>

    <!-- 結束 -->
    <div class="gameover-screen" id="gameover">
        <h1>GAME OVER</h1>
        <p id="winner-text"></p>
        <button class="neon-btn" onclick="backMenu()">返回選單</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
