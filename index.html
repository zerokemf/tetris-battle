<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tetris Battle - SRS Edition</title>
    <link rel="stylesheet" href="style.css?v=2.1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated background -->
    <div class="bg-particles" id="bg-particles"></div>

    <div class="game-container" id="game-container">
        <!-- Left Panel -->
        <div class="side-panel left-panel">
            <div class="neon-window">
                <div class="panel-header">HOLD</div>
                <div class="panel-content" id="hold-box">
                    <canvas id="hold1" width="120" height="80"></canvas>
                </div>
            </div>
            <div class="neon-window">
                <div class="panel-header">CONTROLS</div>
                <div class="panel-content controls-text">
                    <div class="control-row"><span class="key">← →</span> Move</div>
                    <div class="control-row"><span class="key">↑</span> Rotate CW</div>
                    <div class="control-row"><span class="key">Z</span> Rotate CCW</div>
                    <div class="control-row"><span class="key">↓</span> Soft Drop</div>
                    <div class="control-row"><span class="key">SPACE</span> Hard Drop</div>
                    <div class="control-row"><span class="key">C</span> Hold</div>
                    <div class="control-row"><span class="key">P</span> Pause</div>
                </div>
            </div>
        </div>

        <!-- Center Arena -->
        <div class="center-arena">
            <h1 class="game-title">TETRIS<span class="title-accent">BATTLE</span></h1>
            <div class="canvas-wrapper" id="canvas-wrapper">
                <canvas id="board1"></canvas>
                <canvas id="fx1" class="fx-layer"></canvas>
                <div id="combo-display" class="combo-display hidden"></div>
                <div id="action-text" class="action-text hidden"></div>
                <div id="status-overlay" class="hidden"></div>
            </div>
            <div class="bottom-bar">
                <button class="pause-btn" id="pause-btn" onclick="togglePause()">PAUSE</button>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="side-panel right-panel">
            <div class="neon-window">
                <div class="panel-header">NEXT</div>
                <div class="panel-content flex-column" id="next-queue">
                    <canvas id="next1" width="120" height="80"></canvas>
                    <canvas id="next2" width="100" height="65"></canvas>
                    <canvas id="next3" width="100" height="65"></canvas>
                </div>
            </div>
            <div class="neon-window stats-window">
                <div class="panel-header">STATS</div>
                <div class="panel-content stats-text">
                    <div class="stat-item">
                        <div class="stat-label">SCORE</div>
                        <div class="stat-value" id="score1">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">LEVEL</div>
                        <div class="stat-value" id="level1">1</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">LINES</div>
                        <div class="stat-value" id="sent1">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">COMBO</div>
                        <div class="stat-value combo-val" id="combo1">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Menu Screen -->
    <div class="menu-screen" id="menu">
        <div class="menu-bg-glow"></div>
        <h1 class="title">TETRIS<span class="title-sub">BATTLE</span></h1>
        <div class="menu-subtitle">SRS EDITION</div>
        <button class="neon-btn pulse" onclick="startGame()">
            START GAME
        </button>
    </div>

    <!-- Game Over Screen -->
    <div class="gameover-screen" id="gameover">
        <h1 class="gameover-title">GAME OVER</h1>
        <div class="final-stats">
            <div class="final-stat"><span class="final-label">SCORE</span><span class="final-value" id="final-score">0</span></div>
            <div class="final-stat"><span class="final-label">LINES</span><span class="final-value" id="final-lines">0</span></div>
            <div class="final-stat"><span class="final-label">LEVEL</span><span class="final-value" id="final-level">0</span></div>
            <div class="final-stat"><span class="final-label">MAX COMBO</span><span class="final-value" id="final-combo">0</span></div>
        </div>
        <button class="neon-btn" onclick="backMenu()">BACK TO MENU</button>
    </div>

    <script src="game.js?v=2.3"></script>
</body>
</html>
