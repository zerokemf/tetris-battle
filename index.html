<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 選單畫面 -->
    <div class="menu-screen" id="menu">
        <h1 class="title">🧊 TETRIS BATTLE</h1>
        <button class="neon-btn big-btn" onclick="startGame()">
            <span class="icon">🎮</span> 開始遊戲
        </button>
    </div>

    <!-- 遊戲區域 -->
    <div class="game-container" id="game">
        <!-- 左上角：HOLD + 操作說明 -->
        <div class="left-panel">
            <div class="panel-box">
                <div class="panel-title">HOLD</div>
                <canvas id="hold1" width="100" height="80"></canvas>
            </div>
            
            <div class="panel-box controls">
                <div class="panel-title">操作說明</div>
                <div class="control-list">
                    <div class="control-item"><span class="key">← →</span> 移動</div>
                    <div class="control-item"><span class="key">↑</span> 旋轉</div>
                    <div class="control-item"><span class="key">Z</span> 逆旋</div>
                    <div class="control-item"><span class="key">↓</span> 軟降</div>
                    <div class="control-item"><span class="key">Space</span> 硬降</div>
                    <div class="control-item"><span class="key">C</span> Hold</div>
                </div>
            </div>
        </div>

        <!-- 中央：遊戲畫布 + 標題 -->
        <div class="center-panel">
            <div class="game-title">TETRIS</div>
            <div class="canvas-wrap">
                <canvas id="board1" width="300" height="600"></canvas>
                <canvas id="fx1" class="fx-layer" width="300" height="600"></canvas>
                <div class="paused-overlay" id="pausedOverlay">
                    <h2>PAUSED</h2>
                    <p>按 P 繼續</p>
                </div>
            </div>
            <button class="pause-btn" onclick="togglePause()">⏸️ PAUSE</button>
        </div>

        <!-- 右側：NEXT + 統計 -->
        <div class="right-panel">
            <div class="panel-box">
                <div class="panel-title">NEXT</div>
                <canvas id="next1" width="100" height="160"></canvas>
            </div>
            
            <div class="panel-box stats">
                <div class="panel-title">ARENA STATS</div>
                <div class="stat-row">
                    <span>⭐ K.O.</span>
                    <span class="star-display" id="stars1">★★★★★</span>
                </div>
                <div class="stat-row">
                    <span>Lines</span>
                    <span class="val" id="sent1">0</span>
                </div>
                <div class="stat-row">
                    <span>Score</span>
                    <span class="val" id="score1">0</span>
                </div>
                <div class="stat-row">
                    <span>Level</span>
                    <span class="val" id="level1">1</span>
                </div>
            </div>
            
            <!-- COMBO 顯示 -->
            <div class="combo-display" id="combo"></div>
        </div>
    </div>

    <!-- 結束畫面 -->
    <div class="gameover-screen" id="gameover">
        <h1>GAME OVER</h1>
        <p id="winner-text"></p>
        <button class="neon-btn" onclick="backMenu()">返回選單</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
